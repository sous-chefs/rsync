---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  simple: &simple_run_list
    - recipe[test::simple]
  read_only: &read_only_run_list
    - recipe[test::read_only]
  networking: &networking_run_list
    - recipe[test::networking]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  simple: &simple_verifier
    inspec_tests:
      - path: test/integration/simple
  read_only: &read_only_verifier
    inspec_tests:
      - path: test/integration/read-only
  networking: &networking_verifier
    inspec_tests:
      - path: test/integration/networking

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier
  - name: simple
    run_list: *simple_run_list
    verifier: *simple_verifier
  - name: read-only
    run_list: *read_only_run_list
    verifier: *read_only_verifier
  - name: networking
    run_list: *networking_run_list
    verifier: *networking_verifier
